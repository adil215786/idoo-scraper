name: T-Mobile Inventory Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1,3,5'  # Mon/Wed/Fri 9 AM EST

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Chrome (matched version)
      uses: browser-actions/setup-chrome@latest
      with:
        chrome-version: stable

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create credentials file
      run: |
        echo "${{ secrets.CREDENTIALS }}" > cred.txt

    - name: Run scraper
      run: |
        python scraper.py
      env:
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

    - name: Upload generated reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: inventory-reports-${{ github.run_number }}
        path: download_files/*.xlsx
        retention-days: 30

    - name: Upload logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: scraper-logs-${{ github.run_number }}
        path: |
          scraper.log
          download_files/*.png
        retention-days: 7
